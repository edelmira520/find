<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>书封资料库工具</title>
  <link rel="stylesheet" href="/app/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>书封资料库工具</h1>
        <p>本地资料库，批量查找平面书封和立体书封。</p>
      </div>
      <nav class="tabs" aria-label="页面">
        <button class="tab active" data-view="search">查找</button>
        <button class="tab" data-view="manage">资料维护</button>
      </nav>
    </header>

    <main>
      <section id="searchView" class="view active">
        <section class="panel">
          <div class="panel-head">
            <h2>批量识别书名</h2>
            <button id="clearSearch" class="ghost">清空</button>
          </div>
          <textarea id="pasteInput" placeholder="粘贴文本，例如：本周要找《高效演讲》《幸福的方法》、活着，还有 大脑效率革命"></textarea>
          <div class="actions">
            <button id="extractTitles">识别书名</button>
            <button id="runMatch" class="primary" disabled>开始匹配</button>
          </div>
        </section>

        <section id="previewPanel" class="panel hidden">
          <div class="panel-head">
            <h2>识别书名预览</h2>
            <span id="previewCount" class="muted"></span>
          </div>
          <div id="titleChips" class="chips"></div>
          <div class="inline-add">
            <input id="manualTitle" type="text" placeholder="手动补充书名">
            <button id="addManualTitle" class="ghost">添加</button>
          </div>
        </section>

        <section id="resultsPanel" class="panel hidden">
          <div class="panel-head">
            <h2>查找结果</h2>
            <div class="toolbar">
              <span id="matchSummary" class="muted"></span>
              <button id="gridMode" class="ghost active">网格</button>
              <button id="listMode" class="ghost">列表</button>
            </div>
          </div>
          <div id="results" class="results-grid"></div>
        </section>
      </section>

      <section id="manageView" class="view">
        <section class="panel">
          <div class="panel-head">
            <h2>资料维护</h2>
            <button id="newBook" class="primary">新增书籍</button>
          </div>
          <input id="manageSearch" type="search" placeholder="搜索书名">
          <div id="bookList" class="book-list"></div>
        </section>
      </section>
    </main>
  </div>

  <dialog id="bookDialog">
    <form method="dialog" id="bookForm">
      <div class="dialog-head">
        <h2 id="dialogTitle">新增书籍</h2>
        <button id="closeDialog" class="icon" value="cancel" aria-label="关闭">×</button>
      </div>
      <input type="hidden" id="bookId">
      <label class="field">
        <span>书名</span>
        <input id="bookTitle" required>
      </label>
      <div id="actualVersion" class="actual-version"></div>
      <div class="upload-grid">
        <div class="upload-slot" data-slot="custom_flat">
          <h3>自制平封</h3>
          <div class="drop-zone">拖拽图片到这里，或点击选择</div>
          <input type="file" accept="image/*">
          <input class="cover-path" type="text" placeholder="或输入图片链接">
          <img alt="">
        </div>
        <div class="upload-slot" data-slot="original_flat">
          <h3>原版平封</h3>
          <div class="drop-zone">拖拽图片到这里，或点击选择</div>
          <input type="file" accept="image/*">
          <input class="cover-path" type="text" placeholder="或输入图片链接">
          <img alt="">
        </div>
        <div class="upload-slot" data-slot="original_3d">
          <h3>原版立封</h3>
          <div class="drop-zone">拖拽图片到这里，或点击选择</div>
          <input type="file" accept="image/*">
          <input class="cover-path" type="text" placeholder="或输入图片链接">
          <img alt="">
        </div>
        <div class="upload-slot" data-slot="fallback_flat">
          <h3>普通平封</h3>
          <div class="drop-zone">拖拽图片到这里，或点击选择</div>
          <input type="file" accept="image/*">
          <input class="cover-path" type="text" placeholder="或输入图片链接">
          <img alt="">
        </div>
      </div>
      <div class="dialog-actions">
        <button id="deleteBook" class="danger" type="button">删除</button>
        <span></span>
        <button value="cancel" class="ghost">取消</button>
        <button id="saveBook" class="primary" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script src="/app/app.js"></script>
</body>
</html>
