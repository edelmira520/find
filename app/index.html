<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>书封素材工作台</title>
  <link rel="stylesheet" href="/app/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>书封素材工作台</h1>
        <p>本地 Node 版，日常核对、查找和维护书封资料。</p>
      </div>
      <div class="topbar-actions">
        <label class="speaker-picker">
          <span>当前讲书人</span>
          <select id="speakerSelect" name="speakerSelect"></select>
        </label>
        <button id="addSpeaker" class="ghost speaker-add" type="button" aria-label="新增讲书人" title="新增讲书人">＋</button>
        <nav class="tabs" aria-label="页面">
          <button class="tab active" data-view="search">查找</button>
          <button class="tab" data-view="manage">资料维护</button>
        </nav>
      </div>
    </header>

    <div id="appStatus" class="app-status" role="status" aria-live="polite"></div>

    <main>
      <section id="searchView" class="view active">
        <section class="search-board">
          <div class="paste-panel">
            <div class="panel-head compact">
              <h2>批量查找</h2>
              <button id="clearSearch" class="ghost">清空</button>
            </div>
            <textarea id="pasteInput" name="pasteInput" autocomplete="off" placeholder="粘贴文本，例如：本周要找《高效演讲》《幸福的方法》、活着，还有 大脑效率革命"></textarea>
            <div class="actions">
              <button id="runMatch" class="primary strong" disabled>开始匹配</button>
            </div>
          </div>

          <div id="previewPanel" class="preview-panel">
            <div class="panel-head compact">
              <h2>识别书名</h2>
              <span id="previewCount" class="muted" aria-live="polite">识别到 0 本</span>
            </div>
            <p class="preview-hint">左侧会自动识别书名；漏掉的书可在下方手动补充，都会一起参与匹配。</p>
            <div id="titleChips" class="chips empty"></div>
            <div class="inline-add">
              <input id="manualTitle" name="manualTitle" type="text" autocomplete="off" placeholder="手动补充书名">
              <button id="addManualTitle" class="ghost">添加</button>
            </div>
          </div>
        </section>

        <section id="resultsPanel" class="result-board hidden">
          <div class="result-head">
            <div>
              <h2>封面墙</h2>
              <div id="matchSummary" class="summary-line" aria-live="polite"></div>
            </div>
            <div class="filters" aria-label="结果筛选">
              <button class="filter active" data-filter="all">显示全部</button>
              <button class="filter" data-filter="possible">只看待确认</button>
              <button class="filter" data-filter="missing">只看未找到</button>
              <button class="filter" data-filter="offline">只看已下架</button>
            </div>
          </div>
          <div id="results" class="results-grid"></div>
        </section>
      </section>

      <section id="manageView" class="view">
        <section class="manage-workbench">
          <aside class="library-list">
            <div class="panel-head compact">
              <h2>素材库</h2>
              <div class="mini-actions">
                <button id="batchDrafts" class="ghost">批量草稿</button>
                <button id="newBook" class="primary">新增素材</button>
              </div>
            </div>
            <input id="manageSearch" name="manageSearch" type="search" autocomplete="off" placeholder="搜索书名">
            <div id="bookList" class="book-list"></div>
          </aside>

          <section class="editor-panel">
            <form id="bookForm">
              <div class="editor-head">
                <div>
                  <h2 id="dialogTitle">选择一本书开始维护</h2>
                  <p id="editorHint">左侧选择书籍，或新增一本待补封面的资料。</p>
                </div>
                <button id="resetEditor" class="ghost" type="button">取消编辑</button>
              </div>
              <input type="hidden" id="bookId">
              <label class="field">
                <span>书名</span>
                <input id="bookTitle" name="bookTitle" autocomplete="off" required>
              </label>
              <label class="field">
                <span>讲书人</span>
                <select id="bookSpeaker" name="bookSpeaker" autocomplete="off" required></select>
              </label>
              <label class="field">
                <span>书籍状态</span>
                <select id="bookStatus" name="bookStatus" autocomplete="off">
                  <option value="active">正常可用</option>
                  <option value="offline">平台已下架</option>
                </select>
              </label>
              <label class="field">
                <span>备注</span>
                <textarea id="bookNote" name="bookNote" autocomplete="off" placeholder="Excel M列备注，可记录内部说明"></textarea>
              </label>
              <input id="preferredVersion" name="preferredVersion" type="hidden" value="auto">
              <div class="upload-grid">
                <div class="upload-slot" data-slot="custom_flat">
                  <div class="slot-head">
                    <h3>自制平封</h3>
                    <button class="clear-slot" type="button">清空</button>
                  </div>
                  <div class="drop-zone">拖拽图片到这里，或点击选择</div>
                  <input type="file" accept="image/jpeg,image/png,image/webp,image/gif">
                  <input class="cover-path" name="coverPath" type="url" inputmode="url" autocomplete="off" placeholder="或输入图片链接">
                  <img alt="">
                  <div class="slot-status">缺失</div>
                  <button class="set-display" type="button">设为展示</button>
                </div>
                <div class="upload-slot" data-slot="original_flat">
                  <div class="slot-head">
                    <h3>原版平封</h3>
                    <button class="clear-slot" type="button">清空</button>
                  </div>
                  <div class="drop-zone">拖拽图片到这里，或点击选择</div>
                  <input type="file" accept="image/jpeg,image/png,image/webp,image/gif">
                  <input class="cover-path" name="coverPath" type="url" inputmode="url" autocomplete="off" placeholder="或输入图片链接">
                  <img alt="">
                  <div class="slot-status">缺失</div>
                  <button class="set-display" type="button">设为展示</button>
                </div>
                <div class="upload-slot" data-slot="original_3d">
                  <div class="slot-head">
                    <h3>原版立封</h3>
                    <button class="clear-slot" type="button">清空</button>
                  </div>
                  <div class="drop-zone">拖拽图片到这里，或点击选择</div>
                  <input type="file" accept="image/jpeg,image/png,image/webp,image/gif">
                  <input class="cover-path" name="coverPath" type="url" inputmode="url" autocomplete="off" placeholder="或输入图片链接">
                  <img alt="">
                  <div class="slot-status">缺失</div>
                </div>
              </div>
              <div class="dialog-actions">
                <button id="deleteBook" class="danger" type="button">删除书籍</button>
                <span></span>
                <button id="saveBook" class="primary" type="submit">保存</button>
              </div>
            </form>
          </section>
        </section>
      </section>
    </main>
  </div>

  <dialog id="detailDialog" class="detail-dialog">
    <div class="dialog-head">
      <h2 id="detailTitle">封面详情</h2>
      <button id="closeDetail" class="icon" type="button" aria-label="关闭">×</button>
    </div>
    <div id="detailContent"></div>
  </dialog>

  <dialog id="batchDialog">
    <form method="dialog" id="batchForm">
      <div class="dialog-head">
        <h2>批量新增草稿</h2>
        <button class="icon" value="cancel" type="button" data-close-batch aria-label="关闭">×</button>
      </div>
      <p id="batchSpeakerHint" class="dialog-hint"></p>
      <textarea id="batchTitles" name="batchTitles" autocomplete="off" placeholder="一行一本，或用顿号/逗号分隔"></textarea>
      <div class="dialog-actions">
        <span></span>
        <button value="cancel" class="ghost" type="button" data-close-batch>取消</button>
        <button class="primary" type="submit">生成草稿</button>
      </div>
    </form>
  </dialog>

  <dialog id="speakerDialog">
    <form method="dialog" id="speakerForm">
      <div class="dialog-head">
        <h2 id="speakerDialogTitle">选择讲书人</h2>
        <button class="icon" value="cancel" type="button" data-close-speaker aria-label="关闭">×</button>
      </div>
      <p id="speakerDialogHint" class="dialog-hint">新增书籍需要归属到一个具体讲书人。</p>
      <label class="field" id="speakerExistingField">
        <span>选择已有讲书人</span>
        <select id="speakerDialogSelect" autocomplete="off"></select>
      </label>
      <button id="speakerNewToggle" class="ghost subtle-action" type="button">没有这个讲书人？新增</button>
      <label class="field" id="speakerNewField">
        <span>讲书人名称</span>
        <input id="speakerDialogName" name="speakerDialogName" type="text" autocomplete="off" placeholder="例如：讲书人A">
      </label>
      <div class="dialog-actions">
        <span></span>
        <button value="cancel" class="ghost" type="button" data-close-speaker>取消</button>
        <button class="primary" type="submit">确定</button>
      </div>
    </form>
  </dialog>

  <script src="/app/app.js"></script>
</body>
</html>
